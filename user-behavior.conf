# Flume配置文件 - 用户行为日志采集

# 定义代理名称
agent.sources = userBehaviorSource
agent.sinks = hdfsSink
agent.channels = memoryChannel

# 配置数据源
agent.sources.userBehaviorSource.type = exec
agent.sources.userBehaviorSource.command = tail -F D:\data_warehouse\ods\log\user_behavior_*.log
agent.sources.userBehaviorSource.channels = memoryChannel

# 配置通道
agent.channels.memoryChannel.type = memory
agent.channels.memoryChannel.capacity = 10000
agent.channels.memoryChannel.transactionCapacity = 1000

# 配置 sink
agent.sinks.hdfsSink.type = hdfs
agent.sinks.hdfsSink.channel = memoryChannel
agent.sinks.hdfsSink.hdfs.path = hdfs://localhost:9000/user/root/behavior_logs/%Y%m%d
agent.sinks.hdfsSink.hdfs.filePrefix = user_behavior_
agent.sinks.hdfsSink.hdfs.fileSuffix = .log
agent.sinks.hdfsSink.hdfs.rollInterval = 3600
agent.sinks.hdfsSink.hdfs.rollSize = 104857600
agent.sinks.hdfsSink.hdfs.rollCount = 0
agent.sinks.hdfsSink.hdfs.batchSize = 100
agent.sinks.hdfsSink.hdfs.useLocalTimeStamp = true
agent.sinks.hdfsSink.hdfs.fileType = DataStream